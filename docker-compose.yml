services:
  sage-server-dev:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    image: sage-server-dev:v1.0
    container_name: sage-server-dev
    volumes:
      - ${SAGE_ROOT}/sage-server/sessions:/app/sessions
      - ${SAGE_ROOT}/sage-server/agents:/app/agents
      - ${SAGE_ROOT}/sage-server/logs:/app/logs
      - ${SAGE_ROOT}/sage-server/data:/app/data
      - ${SAGE_ROOT}/sage-server/skills:/app/skills
      - ${SAGE_ROOT}/sage-server/users:/app/users
    ports:
      - 30150:8080
    env_file:
      - .env
    environment:
      SAGE_WEB_BASE_PATH: ${SAGE_WEB_BASE_PATH:-/sage}
      SAGE_TRACE_JAEGER_UI_URL: ${SAGE_TRACE_JAEGER_UI_URL:-http://sage-jaeger-dev:16686/jaeger}
      SAGE_TRACE_JAEGER_PUBLIC_URL: ${SAGE_TRACE_JAEGER_PUBLIC_URL:-http://127.0.0.1:30151/jaeger}
      SAGE_TRACE_JAEGER_BASE_PATH: ${SAGE_TRACE_JAEGER_BASE_PATH:-/api/observability/jaeger}
      SAGE_SESSION_DIR: /app/sessions
      SAGE_LOCAL_LINUX_ISOLATION: bwrap
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    mem_limit: 16g
    cpus: 4.0

  sage-web-dev:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_SAGE_API_BASE_URL: ${SAGE_API_BASE_URL}
        VITE_SAGE_TRACE_WEB_URL: ${SAGE_TRACE_WEB_URL}
        VITE_SAGE_WEB_BASE_PATH: ${SAGE_WEB_BASE_PATH:-/sage/}
    image: sage-web-dev:v1.0
    container_name: sage-web-dev
    ports:
      - 30151:80
    environment:
      TZ: 'Asia/Shanghai'
      VITE_SAGE_API_BASE_URL: ${SAGE_API_BASE_URL}
      VITE_SAGE_TRACE_WEB_URL: ${SAGE_TRACE_WEB_URL}
      VITE_SAGE_WEB_BASE_PATH: ${SAGE_WEB_BASE_PATH:-/sage/}
    depends_on:
      - sage-server-dev
    mem_limit: 512m
    cpus: 0.5

  sage-wiki-dev:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.wiki
      args:
        VITE_SAGE_API_BASE_URL: ${SAGE_API_BASE_URL}
    image: sage-wiki-dev:v1.0
    container_name: sage-wiki-dev
    ports:
      - 30157:80
    environment:
      TZ: 'Asia/Shanghai'
      VITE_SAGE_API_BASE_URL: ${SAGE_API_BASE_URL}
    depends_on:
      - sage-server-dev
    mem_limit: 512m
    cpus: 0.5

  sage-mysql-dev:
    restart: always
    image: docker.m.daocloud.io/mysql:8.4
    container_name: sage-mysql-dev
    ports:
      - 30152:3306
    environment:
      TZ: 'Asia/Shanghai'
      MYSQL_ROOT_PASSWORD: ${SAGE_MYSQL_PASSWORD}
      MYSQL_ROOT_HOST: '%'
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ${SAGE_ROOT}/mysql/data:/var/lib/mysql
      - ${SAGE_ROOT}/mysql/conf:/etc/mysql/conf.d
    mem_limit: 1g
    cpus: 1.0
  sage-rustfs-dev:
    image: docker.m.daocloud.io/rustfs/rustfs:latest
    ports:
      - 30154:9000
      - 30155:9001
    volumes:
      - ${SAGE_ROOT}/rustfs/data:/data
    container_name: sage-rustfs-dev
    restart: always
    environment:
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=${SAGE_S3_ACCESS_KEY}
      - RUSTFS_SECRET_KEY=${SAGE_S3_SECRET_KEY}
      - RUSTFS_OBS_LOGGER_LEVEL=info
    healthcheck:
      test:
        [
          "CMD",
          "sh", "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    mem_limit: 1g
    cpus: 0.5